name: Build Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: lp-linux
          - os: macos-latest
            artifact: lp-macos
          - os: windows-latest
            artifact: lp-windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libxcb-xinerama0 libxkbcommon-x11-0

      - name: Install Python dependencies
        run: pip install -r requirements-build.txt

      - name: Build with PyInstaller
        run: pyinstaller lp.spec

      - name: Archive Linux build
        if: runner.os == 'Linux'
        run: |
          cd dist
          tar czf ../lp-linux.tar.gz lp/

      - name: Archive macOS build
        if: runner.os == 'macOS'
        run: |
          cd dist
          tar czf ../lp-macos.tar.gz lp.app/ || tar czf ../lp-macos.tar.gz lp/

      - name: Archive Windows build
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/lp -DestinationPath lp-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            lp-linux.tar.gz
            lp-macos.tar.gz
            lp-windows.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            lp-linux/lp-linux.tar.gz
            lp-macos/lp-macos.tar.gz
            lp-windows/lp-windows.zip
          generate_release_notes: true
